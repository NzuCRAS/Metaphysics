services:
  backend:
    build: ./backend
    container_name: metaphysics-backend
    ports:
      # 仅供宿主机 Nginx 反向代理，不直接暴露到公网
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      # 开发时可挂载 prompts 目录，方便调试
      - ./backend/prompts:/app/prompts:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: metaphysics-postgres
    environment:
      POSTGRES_USER: metaphysics
      POSTGRES_PASSWORD: ${DB_PASSWORD:-metaphysics_pass}
      POSTGRES_DB: metaphysics
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metaphysics -d metaphysics"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: metaphysics-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
