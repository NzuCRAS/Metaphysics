<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DaoFortune · 流量仪表盘</title>
    <link rel="stylesheet" href="/css/style.css?v=6" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" integrity="sha384-9nhczxUqK87bcKHh20fSQcTGD4qq5GhayNYSYWqwBkINBhOfQLg/P5HG5lF1urn4" crossorigin="anonymous"></script>
    <style>
      .admin-shell {
        position: relative;
        max-width: 1440px;
        margin: 0 auto;
        padding: 24px clamp(16px, 4vw, 48px) 64px;
      }
      .admin-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 24px;
      }
      .admin-title {
        color: var(--gold-bright);
        font-size: 22px;
        font-weight: 700;
      }
      .admin-controls {
        display: flex;
        align-items: flex-end;
        gap: 12px;
        flex-wrap: wrap;
      }
      .admin-controls label {
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-size: 13px;
        color: var(--muted);
      }
      .admin-controls input {
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--paper);
        min-width: 160px;
      }
      .admin-controls button {
        padding: 10px 16px;
        border-radius: 10px;
        background: var(--gold);
        color: var(--black);
        font-weight: 600;
      }
      .admin-controls button.secondary {
        background: transparent;
        border: 1px solid var(--gold);
        color: var(--gold);
      }
      .cards-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 16px;
        margin-bottom: 28px;
      }
      .metric-card {
        background: var(--surface-soft);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 18px;
      }
      .metric-card .label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin-bottom: 8px;
      }
      .metric-card .value {
        font-size: 28px;
        font-weight: 700;
        color: var(--gold-bright);
      }
      .charts-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
        gap: 20px;
        margin-bottom: 28px;
      }
      .panel {
        background: var(--surface-soft);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 18px;
      }
      .panel h3 {
        margin: 0 0 14px;
        font-size: 16px;
        color: var(--paper);
      }
      .chart-wrap {
        position: relative;
        height: 260px;
      }
      .tables-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 20px;
        margin-bottom: 28px;
      }
      .data-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      .data-table th,
      .data-table td {
        padding: 8px 10px;
        text-align: left;
        border-bottom: 1px solid var(--line);
      }
      .data-table th {
        color: var(--muted);
        font-weight: 600;
      }
      .data-table td {
        color: var(--paper);
      }
      .data-table tr:hover td {
        background: rgba(217, 179, 90, 0.08);
      }
      .event-log-panel {
        grid-column: 1 / -1;
      }
      .event-log {
        max-height: 520px;
        overflow: auto;
      }
      .event-log .ua {
        max-width: 260px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .pagination {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 12px;
      }
      .pagination button {
        padding: 8px 14px;
        border-radius: 8px;
        background: var(--surface);
        border: 1px solid var(--line);
        color: var(--paper);
      }
      .error-message {
        background: rgba(168, 46, 38, 0.18);
        border: 1px solid var(--red);
        color: var(--red-bright);
        padding: 12px 16px;
        border-radius: 10px;
        margin-bottom: 20px;
      }
      .hidden {
        display: none !important;
      }
      .tag {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
      }
      .tag-pageview { background: rgba(84, 160, 255, 0.18); color: #7abaff; }
      .tag-bazi_request { background: rgba(217, 179, 90, 0.18); color: var(--gold-bright); }
      .tag-bazi_report { background: rgba(106, 217, 126, 0.18); color: #7ae88a; }
      .tag-palmistry_request { background: rgba(217, 179, 90, 0.18); color: var(--gold-bright); }
      .tag-palmistry_report { background: rgba(106, 217, 126, 0.18); color: #7ae88a; }
    </style>
  </head>
  <body>
    <main class="admin-shell">
      <div class="admin-topbar">
        <a class="brand" href="/" aria-label="DaoFortune home">
          <span class="brand-mark" aria-hidden="true">☯</span>
          <span class="admin-title">DaoFortune 流量仪表盘</span>
        </a>
        <div class="admin-controls">
          <label>
            <span>管理 Token</span>
            <input id="admin-token" type="password" placeholder="输入 ADMIN_TOKEN" />
          </label>
          <label>
            <span>日期（UTC）</span>
            <input id="report-date" type="date" />
          </label>
          <button id="load-dashboard" type="button">加载仪表盘</button>
          <button id="download-report" class="secondary" type="button">下载 .txt</button>
        </div>
      </div>

      <div id="error-message" class="error-message hidden"></div>

      <div id="dashboard" class="hidden">
        <div class="cards-grid">
          <div class="metric-card">
            <div class="label">页面浏览量</div>
            <div class="value" id="card-pv">0</div>
          </div>
          <div class="metric-card">
            <div class="label">八字请求</div>
            <div class="value" id="card-bazi-req">0</div>
          </div>
          <div class="metric-card">
            <div class="label">八字报告</div>
            <div class="value" id="card-bazi-rpt">0</div>
          </div>
          <div class="metric-card">
            <div class="label">手相报告</div>
            <div class="value" id="card-palm-rpt">0</div>
          </div>
          <div class="metric-card">
            <div class="label">独立 IP</div>
            <div class="value" id="card-ips">0</div>
          </div>
          <div class="metric-card">
            <div class="label">总花费（CNY）</div>
            <div class="value" id="card-cost">0.0000</div>
          </div>
        </div>

        <div class="charts-grid">
          <div class="panel">
            <h3>每小时流量</h3>
            <div class="chart-wrap">
              <canvas id="hourly-chart"></canvas>
            </div>
          </div>
          <div class="panel">
            <h3>每 30 分钟流量</h3>
            <div class="chart-wrap">
              <canvas id="halfhour-chart"></canvas>
            </div>
          </div>
          <div class="panel">
            <h3>按分流线路</h3>
            <div class="chart-wrap">
              <canvas id="region-chart"></canvas>
            </div>
          </div>
          <div class="panel">
            <h3>各线路花费（CNY）</h3>
            <div class="chart-wrap">
              <canvas id="cost-chart"></canvas>
            </div>
          </div>
        </div>

        <div class="tables-grid">
          <div class="panel">
            <h3>线路汇总</h3>
            <table class="data-table">
              <thead>
                <tr>
                  <th>线路</th>
                  <th>PV</th>
                  <th>请求</th>
                  <th>报告</th>
                  <th>花费</th>
                </tr>
              </thead>
              <tbody id="region-table"></tbody>
            </table>
          </div>
          <div class="panel">
            <h3>每小时汇总</h3>
            <table class="data-table">
              <thead>
                <tr>
                  <th>小时</th>
                  <th>PV</th>
                  <th>请求</th>
                  <th>报告</th>
                </tr>
              </thead>
              <tbody id="hourly-table"></tbody>
            </table>
          </div>
          <div class="panel">
            <h3>每 30 分钟汇总</h3>
            <table class="data-table">
              <thead>
                <tr>
                  <th>时间段</th>
                  <th>PV</th>
                  <th>请求</th>
                  <th>报告</th>
                </tr>
              </thead>
              <tbody id="halfhour-table"></tbody>
            </table>
          </div>

          <div class="panel event-log-panel">
            <h3>事件日志（最新在前）</h3>
            <div class="event-log">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>时间</th>
                    <th>类型</th>
                    <th>线路</th>
                    <th>IP</th>
                    <th>路径</th>
                    <th>输入 tokens</th>
                    <th>输出 tokens</th>
                    <th>花费</th>
                    <th>浏览器</th>
                  </tr>
                </thead>
                <tbody id="event-log-table"></tbody>
              </table>
            </div>
            <div class="pagination">
              <button id="prev-page" type="button">上一页</button>
              <span id="page-info">第 1 页</span>
              <button id="next-page" type="button">下一页</button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="/js/admin.js?v=7"></script>
  </body>
</html>
